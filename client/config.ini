[client]
# Scan / heartbeat intervals (seconds)
scan_interval=300
heartbeat_interval=60

enable_auto_defense=true

[server]
url=http://localhost:8000
api_key=ranbir@69


[defense]
auto_block_threats=true
time_window=60
max_scan_ports=12
max_bruteforce_attempts=20
max_web_probe_attempts=35
alert_cooldown_seconds=180

[apis]
# Required / recommended threat-intel APIs
virustotal=
abuseipdb=
urlscan=
otx=
ipqualityscore=

# Optional enrichment APIs
shodan=
hybrid_analysis=

# Additional threat intelligence APIs
malwarebazaar=
threatfox=
malshare=
triage=

[email]
scan_local_thunderbird=true
poll_interval=60
imap_host=
imap_port=993
imap_user=
imap_pass=
pop3_host=
pop3_port=995
pop3_user=
pop3_pass=

[vulnerability]
scan_interval_hours=6
full_scan_on_start=true

[dns]
poll_interval=5
use_scapy=false

[network]
poll_interval=10

[process]
poll_interval=5

[behavior]
poll_interval=5

[registration]
master_password=your_master_password_here
admin_hostnames=kali,kali-linux-vbox
admin_ips=127.0.0.1
