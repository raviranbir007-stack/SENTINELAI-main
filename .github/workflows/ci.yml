name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r server/requirements.txt
          pip install pytest flake8 mypy black isort
      - name: Run tests
        run: . .venv/bin/activate && pytest -q
      - name: Lint
        run: . .venv/bin/activate && flake8 server
      - name: Type check
        run: . .venv/bin/activate && mypy server || true
