name: security-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit semgrep

      - name: Bandit (SAST)
        run: bandit -q -r server/app -f txt

      - name: Semgrep (SAST rules)
        run: semgrep scan --config p/security-audit server/app

      - name: Dependency CVE scan
        run: |
          if [ -f server/requirements.txt ]; then pip-audit -r server/requirements.txt; fi
          if [ -f client/requirements.txt ]; then pip-audit -r client/requirements.txt; fi

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  performance-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi

      - name: Validate performance targets config
        run: |
          python - <<'PY'
          import os
          max_concurrent = int(os.getenv('SENTINEL_API_MAX_CONCURRENT_CALLS', '12'))
          queue_wait = float(os.getenv('SENTINEL_API_QUEUE_WAIT_TIMEOUT', '2.0'))
          budget = int(os.getenv('SENTINEL_API_BUDGET_DAILY', '5000'))
          assert 2 <= max_concurrent <= 64, 'SENTINEL_API_MAX_CONCURRENT_CALLS out of range'
          assert 0.5 <= queue_wait <= 10.0, 'SENTINEL_API_QUEUE_WAIT_TIMEOUT out of range'
          assert 100 <= budget <= 100000, 'SENTINEL_API_BUDGET_DAILY out of range'
          print('Performance guardrails validated')
          PY
